<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>English Path — Foundations to Pro</title>
  <style>
    :root {
      --bg: #14171c; --panel: #1e232b; --panel-2: #262d37;
      --text: #e8ecf1; --muted: #9aa4b2; --accent: #4A90D9;
      --good: #7BAA50; --warn: #D97A4A; --line: #333b47;
      --radius: 12px; --maxw: 1100px;
    }
    :root[data-theme="light"] {
      --bg: #f4f6f9; --panel: #ffffff; --panel-2: #eef1f5;
      --text: #1b2027; --muted: #5b6675; --line: #d8dee7;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text);
      font: 16px/1.6 system-ui, "Segoe UI", Roboto, sans-serif; }
    #app { max-width: var(--maxw); margin: 0 auto; padding: 16px; }
    button { font: inherit; cursor: pointer; }
    .telugu { font-family: "Nirmala UI", "Gautami", system-ui; }
    .hdr { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;
      padding-bottom:12px; border-bottom:1px solid var(--line); margin-bottom:12px; }
    .hdr h1 { font-size:20px; margin:0; }
    .hdr-tools { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .muted { color:var(--muted); font-size:13px; }
    .tabs { display:flex; gap:6px; overflow-x:auto; padding-bottom:10px; }
    .tab { background:var(--panel); color:var(--text); border:1px solid var(--line);
      border-radius:999px; padding:8px 14px; white-space:nowrap; }
    .tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }
    button, .btnlike { background:var(--panel); color:var(--text); border:1px solid var(--line);
      border-radius:8px; padding:6px 10px; }
    .icon { border:none; background:transparent; font-size:16px; padding:2px 6px; }
    .te-wrap { margin:8px 0; }
    .te-btn { background:var(--panel-2); border:1px dashed var(--accent); color:var(--accent);
      border-radius:8px; padding:4px 10px; font-size:14px; }
    .te-body { margin-top:6px; padding:8px 10px; background:var(--panel-2);
      border-left:3px solid var(--accent); border-radius:6px; }
    .telugu { font-size:17px; }
    .lesson-list { display:flex; flex-direction:column; gap:8px; }
    .lesson-item { display:flex; justify-content:space-between; align-items:center; gap:12px; text-align:left; }
    .bar { width:120px; height:8px; background:var(--panel-2); border-radius:99px; overflow:hidden; }
    .bar-fill { display:block; height:100%; background:var(--good); }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
      padding:18px; margin:12px 0; }
    .card h3 { margin-top:0; }
    .ex { display:flex; align-items:center; gap:6px; margin:6px 0; }
    .card.mistake { border-left:4px solid var(--warn); }
    .mistake .wrong { color:var(--warn); text-decoration:line-through; }
    .mistake .right { color:var(--good); display:flex; align-items:center; gap:6px; }
    .mistake .why { color:var(--muted); }
    .back { margin-bottom:8px; }
    .stepper { display:flex; justify-content:space-between; align-items:center; margin-top:14px; }
    .dots { display:flex; gap:6px; }
    .dot { width:8px; height:8px; border-radius:50%; background:var(--panel-2); }
    .dot.on { background:var(--accent); }
    .q { border-top:1px solid var(--line); padding:12px 0; }
    .q-prompt { font-weight:600; margin-bottom:8px; }
    .opt { margin:4px 6px 4px 0; }
    .fill { padding:6px 10px; border-radius:8px; border:1px solid var(--line);
      background:var(--panel-2); color:var(--text); }
    .q-feedback { margin-top:8px; }
    .q-feedback.ok { color:var(--good); }
    .q-feedback.bad { color:var(--warn); }
    .vocab-head { display:flex; align-items:center; gap:8px; }
    .vocab-head h3 { margin:0; }
    .pos { color:var(--muted); font-style:italic; }
    .rate { margin-top:12px; }
    .dline { padding:6px 8px; border-radius:8px; margin:6px 0; }
    .role-a { background:var(--panel-2); }
    .role-b { background:transparent; border:1px solid var(--line); }
    .shadow { margin-top:12px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;
      border-top:1px dashed var(--line); padding-top:10px; }
    .cta { background:var(--accent); color:#fff; border:none; border-radius:10px;
      padding:12px 18px; font-size:16px; margin:12px 0; }
    .stat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; margin:12px 0; }
    .stat { background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
      padding:14px; cursor:pointer; }
    .stat-icon { font-size:24px; }
    @media (max-width: 640px) {
      .hdr { flex-direction:column; align-items:flex-start; }
      .lesson-item { flex-direction:column; align-items:flex-start; gap:4px; }
      .bar { width:100%; }
      .stepper { gap:8px; }
    }
    .concept-intro { margin-top:0; }
    ul.rules { list-style:none; padding:0; margin:10px 0 0; display:flex; flex-direction:column; gap:16px; }
    .rule { border-left:3px solid var(--accent); padding:4px 0 4px 12px; }
    .rule-text { font-weight:600; margin-bottom:6px; }
  </style>
</head>
<body>
  <div id="app">Loading…</div>
  <script>
    "use strict";
    const Storage = {
      KEY: "englishAppState",
      _defaults() {
        return {
          progress: {},
          settings: { theme: "dark", voiceRate: 0.9, voiceName: null },
          review: { wrongQuestions: [], learningWords: [] }
        };
      },
      load() {
        try {
          const raw = localStorage.getItem(this.KEY);
          if (!raw) return this._defaults();
          return Object.assign(this._defaults(), JSON.parse(raw));
        } catch (e) { return this._defaults(); }
      },
      save(state) {
        try { localStorage.setItem(this.KEY, JSON.stringify(state)); }
        catch (e) { console.warn("save failed", e); }
      }
    };
    const CourseData = {
      phases: [
        { id: "dashboard", title: "Dashboard", icon: "🏠", lessons: [] },
        { id: "grammar", title: "Grammar", icon: "📘", lessons: [
          { id: "sentence-basics", title: "Sentence Basics: Word Order", cards: [
            { type: "concept", title: "Subject, Verb, Object (SVO)",
              intro: "English sentences follow a fixed order: Subject, then Verb, then Object.",
              introTe: "ఇంగ్లీష్ వాక్యాలు ఒక స్థిర క్రమంలో ఉంటాయి: మొదట Subject (కర్త), తర్వాత Verb (క్రియ), తర్వాత Object (కర్మ).",
              points: [
                { rule: "The subject is who or what does the action. It usually comes first.",
                  ruleTe: "Subject అంటే పని చేసేది ఎవరు లేదా ఏది. ఇది సాధారణంగా వాక్యం మొదట్లో వస్తుంది.",
                  examples: [
                    { text: "She works in Hyderabad." },
                    { text: "The manager approved the budget." },
                    { text: "They joined the call late." },
                    { text: "My team finished the project." }
                  ] },
                { rule: "The verb is the action word. It comes right after the subject.",
                  ruleTe: "Verb అంటే పని / చర్యను తెలిపే పదం. ఇది subject తర్వాత వెంటనే వస్తుంది.",
                  examples: [
                    { text: "He writes the report every Friday." },
                    { text: "We discussed the new plan." },
                    { text: "The client called this morning." },
                    { text: "I updated the spreadsheet." }
                  ] },
                { rule: "The object receives the action. It comes after the verb — so the order is Subject + Verb + Object.",
                  ruleTe: "Object అంటే చర్యను స్వీకరించేది. ఇది verb తర్వాత వస్తుంది — కాబట్టి క్రమం Subject + Verb + Object.",
                  examples: [
                    { text: "I eat rice every day." },
                    { text: "She reads the news." },
                    { text: "The team sent the invoice." },
                    { text: "He checked the server logs." }
                  ] },
                { rule: "Every English sentence needs a subject, even when there is no clear 'doer' — English uses 'it' or 'there' as a placeholder subject.",
                  ruleTe: "స్పష్టమైన 'చేసేవారు' లేకపోయినా ప్రతి ఇంగ్లీష్ వాక్యానికి subject తప్పనిసరి — 'it' లేదా 'there' అనే placeholder subject వాడతారు.",
                  examples: [
                    { text: "It is raining." },
                    { text: "It is 9 o'clock." },
                    { text: "There is a meeting today." },
                    { text: "There are two options." }
                  ] }
              ] },
            { type: "example", pattern: "Subject + Verb + Object in real sentences",
              sentences: [
                { text: "I drink coffee every morning." },
                { text: "The manager reviewed the proposal." },
                { text: "It is very hot today." }
              ] },
            { type: "mistake", wrong: "I rice eat.", right: "I eat rice.",
              whyEn: "Telugu word order is Subject-Object-Verb, so the verb feels natural at the end. English is Subject-Verb-Object, so the verb must come right after the subject.",
              whyTe: "తెలుగులో వాక్య క్రమం Subject-Object-Verb, కాబట్టి verb చివర రావడం సహజంగా అనిపిస్తుంది. ఇంగ్లీష్‌లో Subject-Verb-Object క్రమం ఉంటుంది, కాబట్టి verb subject తర్వాత వెంటనే రావాలి." },
            { type: "quiz", questions: [
              { format: "mcq", prompt: "Which order does English follow?",
                options: ["Subject-Object-Verb", "Subject-Verb-Object", "Verb-Subject-Object"],
                answer: "Subject-Verb-Object",
                explanationEn: "English always follows Subject-Verb-Object order.",
                explanationTe: "ఇంగ్లీష్ ఎప్పుడూ Subject-Verb-Object క్రమాన్ని అనుసరిస్తుంది." },
              { format: "choose-sentence", prompt: "Choose the correct sentence:",
                options: ["She the report sent.", "She sent the report."],
                answer: "She sent the report.",
                explanationEn: "The verb 'sent' must come right after the subject 'She', before the object 'the report'.",
                explanationTe: "Verb 'sent' subject 'She' తర్వాత వెంటనే రావాలి, object 'the report' కి ముందు." },
              { format: "fill", prompt: "___ is raining outside. (fill the missing subject)",
                answer: "It",
                explanationEn: "English needs a placeholder subject 'It' even when there is no real doer.",
                explanationTe: "నిజమైన 'చేసేవారు' లేకపోయినా ఇంగ్లీష్‌కి placeholder subject 'It' అవసరం." }
            ]}
          ]},
          { id: "nouns-plurals", title: "Nouns & Plurals", cards: [
            { type: "concept", title: "Common, Proper, Plural, and Uncountable Nouns",
              intro: "Nouns name people, places, and things, and most of them change form to show more than one.",
              introTe: "నామవాచకాలు (Nouns) వ్యక్తులు, స్థలాలు, వస్తువులను తెలియజేస్తాయి. చాలా నామవాచకాలు ఒకటికి మించి ఉన్నప్పుడు రూపం మారుస్తాయి.",
              points: [
                { rule: "Common nouns name general things; proper nouns name specific people or places and start with a capital letter.",
                  ruleTe: "Common nouns సాధారణ వస్తువులను తెలియజేస్తాయి; proper nouns నిర్దిష్ట వ్యక్తులు/స్థలాలను తెలియజేస్తాయి, ఇవి పెద్ద అక్షరంతో మొదలవుతాయి.",
                  examples: [
                    { text: "The manager is from India." },
                    { text: "Ravi works at Infosys." },
                    { text: "The city is very busy." },
                    { text: "Hyderabad is a big city." }
                  ] },
                { rule: "Most nouns form the plural by adding -s. Nouns ending in -s, -sh, -ch, -x add -es.",
                  ruleTe: "చాలా నామవాచకాలు బహువచనం కోసం -s చేరుస్తాయి. -s, -sh, -ch, -x తో ముగిసే పదాలు -es చేరుస్తాయి.",
                  examples: [
                    { text: "One laptop, two laptops." },
                    { text: "One box, two boxes." },
                    { text: "One class, two classes." },
                    { text: "One brush, two brushes." }
                  ] },
                { rule: "Some nouns have irregular plural forms that do not follow the -s rule.",
                  ruleTe: "కొన్ని నామవాచకాలు -s నియమాన్ని పాటించని అసాధారణ బహువచన రూపాలను కలిగి ఉంటాయి.",
                  examples: [
                    { text: "One man, two men." },
                    { text: "One woman, two women." },
                    { text: "One child, two children." },
                    { text: "One tooth, two teeth." }
                  ] },
                { rule: "Uncountable nouns have no plural form — we cannot count them one by one.",
                  ruleTe: "అగణనీయ నామవాచకాలకు (Uncountable nouns) బహువచన రూపం ఉండదు — వీటిని ఒక్కొక్కటిగా లెక్కించలేము.",
                  examples: [
                    { text: "I need some information." },
                    { text: "She gave me good advice." },
                    { text: "We don't have much water." },
                    { text: "He has a lot of experience." }
                  ] }
              ] },
            { type: "example", pattern: "Nouns and plurals in real sentences",
              sentences: [
                { text: "The children are playing in the park." },
                { text: "I bought two boxes of pens." },
                { text: "Please share the information with the team." }
              ] },
            { type: "mistake", wrong: "He gave me many informations and advices.", right: "He gave me a lot of information and advice.",
              whyEn: "'Information' and 'advice' are uncountable nouns in English — they never take a plural -s, even though similar Telugu words feel countable.",
              whyTe: "'Information', 'advice' ఇంగ్లీష్‌లో అగణనీయ నామవాచకాలు — వీటికి ఎప్పుడూ బహువచనం -s చేర్చకూడదు, తెలుగులో సంబంధిత పదాలు గణించదగినట్లు అనిపించినా." },
            { type: "quiz", questions: [
              { format: "fill", prompt: "One child, two ___.", answer: "children",
                explanationEn: "'Child' has an irregular plural: children.", explanationTe: "'Child' అసాధారణ బహువచనం: children." },
              { format: "mcq", prompt: "Which sentence is correct?",
                options: ["I need some informations.", "I need some information.", "I need an information."],
                answer: "I need some information.",
                explanationEn: "'Information' is uncountable, so it has no plural and no article 'an'.",
                explanationTe: "'Information' అగణనీయం, కాబట్టి దీనికి బహువచనం లేదా 'an' article ఉండవు." },
              { format: "choose-sentence", prompt: "Choose the correct sentence:",
                options: ["She gave me a useful advice.", "She gave me useful advice."],
                answer: "She gave me useful advice.",
                explanationEn: "'Advice' is uncountable, so we don't use 'a' before it.",
                explanationTe: "'Advice' అగణనీయం, కాబట్టి దీని ముందు 'a' వాడకూడదు." }
            ]}
          ]},
          { id: "pronouns", title: "Pronouns", cards: [
            { type: "concept", title: "Subject, Object, and Possessive Pronouns",
              intro: "Pronouns replace nouns so we don't repeat the same name again and again.",
              introTe: "అదే పేరును పదే పదే చెప్పకుండా ఉండటానికి Pronouns నామవాచకాల స్థానంలో వాడతారు.",
              points: [
                { rule: "Subject pronouns (I, you, he, she, it, we, they) come before the verb, as the doer of the action.",
                  ruleTe: "Subject pronouns (I, you, he, she, it, we, they) చర్య చేసేవారుగా verb ముందు వస్తాయి.",
                  examples: [
                    { text: "I work in the IT department." },
                    { text: "He leads the engineering team." },
                    { text: "She is our new manager." },
                    { text: "They joined the meeting late." }
                  ] },
                { rule: "Object pronouns (me, him, her, us, them) come after the verb or a preposition, as the receiver of the action.",
                  ruleTe: "Object pronouns (me, him, her, us, them) verb లేదా preposition తర్వాత, చర్యను స్వీకరించేవిగా వస్తాయి.",
                  examples: [
                    { text: "Please call me later." },
                    { text: "The manager thanked him." },
                    { text: "She sent the file to us." },
                    { text: "I saw them at the office." }
                  ] },
                { rule: "Possessive pronouns (my, your, his, her, our, their) show ownership and come before a noun.",
                  ruleTe: "Possessive pronouns (my, your, his, her, our, their) యజమాన్యాన్ని చూపుతాయి, నామవాచకం ముందు వస్తాయి.",
                  examples: [
                    { text: "This is my laptop." },
                    { text: "Is that your badge?" },
                    { text: "Their office is on the third floor." },
                    { text: "Our team met the deadline." }
                  ] }
              ] },
            { type: "example", pattern: "Pronouns in real sentences",
              sentences: [
                { text: "I called him, but he did not answer." },
                { text: "They gave us their feedback." },
                { text: "She finished her report early." }
              ] },
            { type: "mistake", wrong: "Me and him went to the client meeting.", right: "He and I went to the client meeting.",
              whyEn: "Subject pronouns (I, he) must be used as the doer of the action, not object pronouns (me, him). Also, in English it is polite to mention yourself last.",
              whyTe: "చర్య చేసేవారిగా subject pronouns (I, he) వాడాలి, object pronouns (me, him) కాదు. అలాగే ఇంగ్లీష్‌లో మర్యాద కోసం మనల్ని చివర చెప్పుకోవాలి." },
            { type: "quiz", questions: [
              { format: "mcq", prompt: "___ finished the report before lunch.", options: ["Him", "He", "His"], answer: "He",
                explanationEn: "As the subject of the sentence, we need the subject pronoun 'He'.",
                explanationTe: "వాక్యంలో subject గా ఉండటానికి subject pronoun 'He' అవసరం." },
              { format: "fill", prompt: "The manager gave ___ (I/me) some feedback.", answer: "me",
                explanationEn: "After the verb 'gave', we need the object pronoun 'me'.",
                explanationTe: "Verb 'gave' తర్వాత object pronoun 'me' అవసరం." },
              { format: "choose-sentence", prompt: "Choose the correct sentence:",
                options: ["Me and him went to the client meeting.", "He and I went to the client meeting."],
                answer: "He and I went to the client meeting.",
                explanationEn: "Use subject pronouns 'He' and 'I' as the doers of the action, and mention yourself last.",
                explanationTe: "చర్య చేసేవారిగా subject pronouns 'He', 'I' వాడాలి, మనల్ని చివర చెప్పుకోవాలి." }
            ]}
          ]},
          { id: "articles", title: "Articles: a / an / the", cards: [
            { type: "concept", title: "Using a, an, the",
              intro: "Articles go before nouns to show whether we mean something general or something specific.",
              introTe: "వస్తువు సాధారణమా లేక నిర్దిష్టమా అని చూపడానికి నామవాచకాల ముందు articles వస్తాయి.",
              points: [
                { rule: "Use 'a' before a consonant sound and 'an' before a vowel sound — for one non-specific thing.",
                  ruleTe: "హల్లు ధ్వని ముందు 'a', అచ్చు ధ్వని ముందు 'an' — నిర్దిష్టం కాని ఒక వస్తువుకు.",
                  examples: [
                    { text: "I need a pen." },
                    { text: "She is an engineer." },
                    { text: "We waited an hour." },

        const pr = this._lessonProgress(phaseId, lessonId);
        if (!pr.cardsDone.includes(idx)) {
          pr.cardsDone.push(idx);
          this.state.progress[key] = pr;
          this.save();
        }
      },
      _renderCard(card, phaseId, lessonId, idx) {
        switch (card.type) {
          case "concept": return this._conceptCard(card);
          case "example": return this._exampleCard(card);
          case "mistake": return this._mistakeCard(card);
          case "vocab": return this._vocabCard(card);
          case "dialogue": return this._dialogueCard(card);
          case "quiz": return this._quizCard(card, phaseId, lessonId);
          default: return this.el("div", {}, "Unknown card");
        }
      },
      _conceptCard(card) {
        const c = this.el("div", { class: "card" });
        c.appendChild(this.el("h3", {}, card.title));
        if (Array.isArray(card.points)) {
          if (card.intro) c.appendChild(this.el("p", { class: "concept-intro" }, card.intro));
          if (card.introTe) c.appendChild(this._teluguReveal(card.introTe));
          const ul = this.el("ul", { class: "rules" });
          card.points.forEach(pt => {
            const li = this.el("li", { class: "rule" });
            li.appendChild(this.el("div", { class: "rule-text" }, pt.rule));
            if (pt.ruleTe) li.appendChild(this._teluguReveal(pt.ruleTe));
            (pt.examples || []).forEach(ex => {
              li.appendChild(this.el("div", { class: "ex" }, this._speakBtn(ex.text), this.el("span", {}, ex.text)));
              if (ex.telugu) li.appendChild(this._teluguReveal(ex.telugu));
            });
            ul.appendChild(li);
          });
          c.appendChild(ul);
          return c;
        }
        // legacy fallback
        if (card.english) c.appendChild(this.el("p", {}, card.english));
        c.appendChild(this._teluguReveal(card.telugu));
        (card.examples || []).forEach(ex => {
          c.appendChild(this.el("div", { class: "ex" }, this._speakBtn(ex.text), this.el("span", {}, ex.text)));
          if (ex.telugu) c.appendChild(this._teluguReveal(ex.telugu));
        });
        return c;
      },
      _exampleCard(card) {
        const c = this.el("div", { class: "card" });
        if (card.pattern) c.appendChild(this.el("h3", {}, card.pattern));
        (card.sentences || []).forEach(s => {
          c.appendChild(this.el("div", { class: "ex" }, this._speakBtn(s.text), this.el("span", {}, s.text)));
          if (s.telugu) c.appendChild(this._teluguReveal(s.telugu));
        });
        return c;
      },
      _mistakeCard(card) {
        const c = this.el("div", { class: "card mistake" });
        c.appendChild(this.el("div", { class: "wrong" }, "✗ " + card.wrong));
        c.appendChild(this.el("div", { class: "right" }, this._speakBtn(card.right), "✓ " + card.right));
        c.appendChild(this.el("p", { class: "why" }, card.whyEn));
        c.appendChild(this._teluguReveal(card.whyTe));
        return c;
      },
      _vocabCard(card) {
        const c = this.el("div", { class: "card" });
        c.appendChild(this.el("div", { class: "vocab-head" },
          this._speakBtn(card.word),
          this.el("h3", {}, card.word),
          this.el("span", { class: "pos" }, card.pos || "")));
        c.appendChild(this.el("p", {}, card.meaningEn));
        c.appendChild(this._teluguReveal(card.meaningTe));
        (card.examples || []).forEach(ex => {
          c.appendChild(this.el("div", { class: "ex" }, this._speakBtn(ex.text), this.el("span", {}, ex.text)));
        });
        const inLearning = this.state.review.learningWords.some(w => w.word === card.word);
        const rate = this.el("div", { class: "rate" },
          this.el("button", { class: "opt", onclick: () => this._rateWord(card, true) }, "Still learning"),
          this.el("button", { class: "opt", onclick: () => this._rateWord(card, false) }, "Got it ✓"));
        if (inLearning) rate.appendChild(this.el("span", { class: "muted" }, " (in Review)"));
        c.appendChild(rate);
        return c;
      },
      _rateWord(card, learning) {
        const list = this.state.review.learningWords;
        const i = list.findIndex(w => w.word === card.word);
        if (learning && i < 0) list.push({ word: card.word, meaningEn: card.meaningEn, meaningTe: card.meaningTe || null });
        if (!learning && i >= 0) list.splice(i, 1);
        this.save(); this.render();
      },
      _shadowControl(modelText) {
        const btn = this.el("button", { class: "opt" }, "🎙 Record");
        if (!Recorder.supported) return this.el("span", { class: "muted" }, "🎙 (recording not supported)");
        let recording = false;
        const playMine = this.el("button", { class: "opt", style: "display:none", onclick: () => Recorder.play() }, "▶ My voice");
        const playModel = this.el("button", { class: "opt", onclick: () => TTS.speak(modelText, this.state) }, "🔊 Model");
        btn.onclick = async () => {
          if (!recording) {
            try { await Recorder.start(); recording = true; btn.textContent = "⏹ Stop"; }
            catch (e) { btn.textContent = "🎙 (mic blocked)"; btn.disabled = true; }
          } else {
            await Recorder.stop(); recording = false; btn.textContent = "🎙 Record again";
            playMine.style.display = "";
          }
        };
        return this.el("div", { class: "shadow" },
          this.el("span", { class: "muted" }, "Your turn — repeat it:"), playModel, btn, playMine);
      },
      _dialogueCard(card) {
        const c = this.el("div", { class: "card" });
        c.appendChild(this.el("h3", {}, "Dialogue"));
        const roleClass = {}; card.roles.forEach((r, i) => roleClass[r] = i === 0 ? "role-a" : "role-b");
        const allText = card.lines.map(l => l.text).join(" ");
        c.appendChild(this.el("button", { class: "opt", onclick: () => TTS.speak(allText, this.state) }, "▶ Play whole conversation"));
        card.lines.forEach(line => {
          c.appendChild(this.el("div", { class: "dline " + roleClass[line.role] },
            this._speakBtn(line.text),
            this.el("b", {}, line.role + ": "),
            this.el("span", {}, line.text)));
        });
        c.appendChild(this._shadowControl(card.lines[0].text));
        return c;
      },
      _quizCard(card, phaseId, lessonId) {
        const c = this.el("div", { class: "card" });
        c.appendChild(this.el("h3", {}, "Quiz"));
        let correct = 0, answered = 0;
        const total = card.questions.length;
        const status = this.el("div", { class: "muted" }, "0 / " + total + " answered");
        card.questions.forEach(q => {
          const qWrap = this.el("div", { class: "q" });
          qWrap.appendChild(this.el("div", { class: "q-prompt" }, q.prompt));
          const feedback = this.el("div", { class: "q-feedback" });
          const commit = given => {
            if (qWrap.dataset.done) return;
            qWrap.dataset.done = "1"; answered++;
            const ok = Quiz.check(q, given);
            if (ok) { correct++; feedback.className = "q-feedback ok"; feedback.textContent = "✓ Correct. " + q.explanationEn; }
            else {
              feedback.className = "q-feedback bad";
              feedback.textContent = "✗ Answer: " + q.answer + ". " + q.explanationEn;
              Quiz.recordWrong(this.state, phaseId, lessonId, q);
            }
            if (q.explanationTe) feedback.appendChild(this._teluguReveal(q.explanationTe));
            status.textContent = answered + " / " + total + " answered";
            this._saveQuizScore(phaseId, lessonId, correct, total);
          };
          if (q.format === "mcq" || q.format === "choose-sentence") {
            q.options.forEach(opt => qWrap.appendChild(
              this.el("button", { class: "opt", onclick: () => commit(opt) }, opt)));
          } else if (q.format === "fill") {
            const inp = this.el("input", { type: "text", class: "fill", placeholder: "type your answer" });
            qWrap.appendChild(inp);
            qWrap.appendChild(this.el("button", { class: "opt", onclick: () => commit(inp.value) }, "Check"));
          }
          qWrap.appendChild(feedback);
          c.appendChild(qWrap);
        });
        c.appendChild(status);
        return c;
      },
      _saveQuizScore(phaseId, lessonId, correct, total) {
        const key = phaseId + "/" + lessonId;
        const pr = this._lessonProgress(phaseId, lessonId);
        pr.quizAttempted = true; pr.quizScore = Math.round((correct / total) * 100);
        this.state.progress[key] = pr; this.save();
      },
      _reviewView() {
        const wrap = this.el("div", { class: "phase" });
        wrap.appendChild(this.el("h2", {}, "🔁 Review"));
        const wrongs = this.state.review.wrongQuestions;
        const words = this.state.review.learningWords;
        if (!wrongs.length && !words.length) {
          wrap.appendChild(this.el("p", { class: "muted" }, "Nothing to review yet. Wrong quiz answers and words you mark 'Still learning' show up here."));
          return wrap;
        }
        if (wrongs.length) {
          wrap.appendChild(this.el("h3", {}, "Questions to retry (" + wrongs.length + ")"));
          wrongs.slice().forEach(q => {
            const qWrap = this.el("div", { class: "card q" });
            qWrap.appendChild(this.el("div", { class: "q-prompt" }, q.prompt));
            const fb = this.el("div", { class: "q-feedback" });
            const commit = given => {
              if (qWrap.dataset.done) return; qWrap.dataset.done = "1";
              if (Quiz.check(q, given)) {
                fb.className = "q-feedback ok"; fb.textContent = "✓ Correct — graduated out of Review.";
                Quiz.graduate(this.state, q.id); this.save();
              } else { fb.className = "q-feedback bad"; fb.textContent = "✗ Answer: " + q.answer + ". " + q.explanationEn; }
            };
            if (q.options) q.options.forEach(o => qWrap.appendChild(this.el("button", { class: "opt", onclick: () => commit(o) }, o)));
            else {
              const inp = this.el("input", { type: "text", class: "fill" });
              qWrap.appendChild(inp);
              qWrap.appendChild(this.el("button", { class: "opt", onclick: () => commit(inp.value) }, "Check"));
            }
            qWrap.appendChild(fb);
            wrap.appendChild(qWrap);
          });
        }
        if (words.length) {
          wrap.appendChild(this.el("h3", {}, "Words to review (" + words.length + ")"));
          words.slice().forEach(w => {
            const c = this.el("div", { class: "card" });
            c.appendChild(this.el("div", { class: "vocab-head" }, this._speakBtn(w.word), this.el("h3", {}, w.word)));
            c.appendChild(this.el("p", {}, w.meaningEn));
            c.appendChild(this._teluguReveal(w.meaningTe));
            c.appendChild(this.el("button", { class: "opt",
              onclick: () => { this.state.review.learningWords = this.state.review.learningWords.filter(x => x.word !== w.word); this.save(); this.render(); } },
              "Got it ✓ (remove)"));
            wrap.appendChild(c);
          });
        }
        return wrap;
      },
      _exportProgress() {
        const blob = new Blob([JSON.stringify(this.state, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = this.el("a", { href: url, download: "english-path-progress.json" });
        document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
      },
      _importProgress(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const data = JSON.parse(reader.result);
            this.state = Object.assign(Storage._defaults(), data);
            this.save();
            document.documentElement.setAttribute("data-theme", this.state.settings.theme);
            this.render();
            alert("Progress restored.");
          } catch (err) { alert("Could not read that file."); }
        };
        reader.readAsText(file);
      }
    };
    UI.state = Storage.load();
    document.documentElement.setAttribute("data-theme", UI.state.settings.theme);
    TTS.init();
    UI.render();
    document.addEventListener("keydown", e => {
      if (["INPUT", "TEXTAREA"].includes(document.activeElement.tagName)) return;
      if (!Router.state.lessonId) return;
      if (e.key === "ArrowRight") Router.nextCard();
      if (e.key === "ArrowLeft") Router.prevCard();
    });
  </script>
</body>
